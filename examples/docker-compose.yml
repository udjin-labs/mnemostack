# docker-compose.yml — minimal stack for mnemostack
#
# Usage:
#   docker compose -f examples/docker-compose.yml up -d
#
# After startup:
#   mnemostack health --provider ollama
#
# Ollama note: if you want Ollama embeddings, run it on the host (or add
# another service here). This compose file only covers Qdrant + Memgraph.

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO

  memgraph:
    image: memgraph/memgraph:latest
    restart: unless-stopped
    ports:
      - "7687:7687"   # Bolt
      - "7444:7444"   # Lab (optional)
    volumes:
      - memgraph_data:/var/lib/memgraph
    command: ["--bolt-server-name-for-init=Neo4j/5.11.0"]  # compat for neo4j driver

volumes:
  qdrant_storage:
  memgraph_data:
