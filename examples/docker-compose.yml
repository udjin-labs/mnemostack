# docker-compose.yml — full mnemostack dev stack (Qdrant + Memgraph + mnemostack).
#
# Fast try-it-out path. Gives you mnemostack CLI inside a container with
# Qdrant and Memgraph already wired up.
#
# Build and start:
#   GEMINI_API_KEY=your-key docker compose -f examples/docker-compose.yml up -d --build
#
# Then, from the host:
#   docker compose -f examples/docker-compose.yml exec mnemostack mnemostack health --provider gemini
#   docker compose -f examples/docker-compose.yml exec mnemostack mnemostack index /data --provider gemini --collection demo
#   docker compose -f examples/docker-compose.yml exec mnemostack mnemostack search "your query" --provider gemini --collection demo
#
# Put markdown notes you want indexed into ./notes next to this file; they
# show up inside the container at /data.
#
# Tear down:
#   docker compose -f examples/docker-compose.yml down         # keep volumes
#   docker compose -f examples/docker-compose.yml down -v      # wipe Qdrant + Memgraph state too

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    # Qdrant's image is minimal (no curl/wget) so we use a tiny netcat-like
    # TCP probe that ships with busybox. If this breaks on a future Qdrant
    # image, replace with: depends_on: service_started + client-side retry.
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  memgraph:
    image: memgraph/memgraph:latest
    restart: unless-stopped
    ports:
      - "7687:7687"   # Bolt
      - "7444:7444"   # Lab (optional)
    volumes:
      - memgraph_data:/var/lib/memgraph
    command: ["--bolt-server-name-for-init=Neo4j/5.11.0"]  # compat for neo4j driver

  mnemostack:
    # Pulls from the local Dockerfile so you get the source you just cloned.
    # Swap this for `image: mnemostack:latest` if you already built the image
    # separately (see ../Dockerfile).
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      qdrant:
        condition: service_healthy
      memgraph:
        condition: service_started
    environment:
      # mnemostack reads these to find services and providers.
      MNEMOSTACK_QDRANT_URL: http://qdrant:6333
      MNEMOSTACK_GRAPH_URI: bolt://memgraph:7687
      MNEMOSTACK_COLLECTION: ${MNEMOSTACK_COLLECTION:-demo}
      MNEMOSTACK_PROVIDER: ${MNEMOSTACK_PROVIDER:-gemini}
      MNEMOSTACK_LLM: ${MNEMOSTACK_LLM:-gemini}
      # Bring your own provider key(s). Only the ones you actually use need to be set.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
    ports:
      - "8000:8000"             # FastAPI HTTP service (docs at /docs)
    volumes:
      - ./notes:/data:ro        # drop your markdown here; indexed into Qdrant
    # Runs the HTTP service. Exec into the container for CLI commands
    # (index, search, health) — the entrypoint in the image is `mnemostack`,
    # so `docker compose exec mnemostack mnemostack <cmd>` works too.
    entrypoint: [""]
    command:
      - bash
      - -lc
      - |
        # Install the server extra into the pre-baked venv.
        pip install --quiet 'mnemostack[server]' >/dev/null
        # Wait for dependencies (Qdrant is fast; Memgraph can be slow on first boot).
        for i in $$(seq 1 30); do
          if (echo > /dev/tcp/qdrant/6333) 2>/dev/null; then break; fi
          echo "waiting for qdrant... ($$i/30)"
          sleep 2
        done
        for i in $$(seq 1 30); do
          if (echo > /dev/tcp/memgraph/7687) 2>/dev/null; then break; fi
          echo "waiting for memgraph... ($$i/30)"
          sleep 2
        done
        exec mnemostack serve \
          --provider "$$MNEMOSTACK_PROVIDER" \
          --llm "$$MNEMOSTACK_LLM" \
          --collection "$$MNEMOSTACK_COLLECTION" \
          --qdrant "$$MNEMOSTACK_QDRANT_URL" \
          --memgraph-uri "$$MNEMOSTACK_GRAPH_URI" \
          --host 0.0.0.0 --port 8000

volumes:
  qdrant_storage:
  memgraph_data:
